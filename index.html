<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real_Time Currency Convertor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    
    <div class="wrapper">
        <h2>$ Currency Convertor $</h2>
        <div class="box">

            <div class="left">
                <div class="from">From</div>
                <select name="currency" class="currency">
                   
                </select>

                <div class="leftbottom">
                <input type="number" id="from" placeholder="Enter Your Amount">
            </div>
        </div>


            <div class="right">
                <div class="to">To</div>
                <select name="currency" class="currency">
                  
                </select>

                <div class="rightbottom">
                <input type="number" id="to" placeholder="Your Currency Amount">
            </div>
            </div>

            
        </div>

        <div class="btn"><button type="submit" id="btn">Convert</button></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
